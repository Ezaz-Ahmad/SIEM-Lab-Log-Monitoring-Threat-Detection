version: "3.8"

# ELK Stack for SIEM Lab
# Usage: docker-compose up -d
# Kibana: http://localhost:5601
# Elasticsearch: http://localhost:9200

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: siem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - siem-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: siem-logstash
    ports:
      - "5044:5044"   # Beats input (Filebeat/Winlogbeat)
      - "5000:5000"   # Syslog input
      - "9600:9600"   # Monitoring
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - siem-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: siem-kibana
    ports:
      - "5601:5601"
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - siem-net

  # Filebeat for Linux log collection (optional - run on monitored host)
  # filebeat:
  #   image: docker.elastic.co/beats/filebeat:8.13.0
  #   container_name: siem-filebeat
  #   user: root
  #   volumes:
  #     - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
  #     - /var/log:/var/log:ro
  #   depends_on:
  #     - logstash
  #   networks:
  #     - siem-net

volumes:
  es-data:
    driver: local

networks:
  siem-net:
    driver: bridge
