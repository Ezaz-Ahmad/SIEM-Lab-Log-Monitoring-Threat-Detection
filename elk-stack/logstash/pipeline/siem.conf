# Logstash SIEM Pipeline
# Accepts: Beats (Winlogbeat/Filebeat) on 5044, Syslog on 5000

input {
  # Winlogbeat / Filebeat from endpoints
  beats {
    port => 5044
    type => "beats"
  }

  # Syslog from Linux hosts
  syslog {
    port => 5000
    type => "syslog"
  }
}

filter {

  # ─── Windows Event Log (via Winlogbeat) ─────────────────────────────────────
  if [agent][type] == "winlogbeat" or [type] == "winlogbeat" {

    # Tag Sysmon events
    if [winlog][channel] == "Microsoft-Windows-Sysmon/Operational" {
      mutate { add_tag => ["sysmon"] }
    }

    # Tag Security events
    if [winlog][channel] == "Security" {
      mutate { add_tag => ["windows-security"] }
    }

    # Detect brute force: EventID 4625 (failed logon)
    if [winlog][event_id] == 4625 {
      mutate {
        add_tag => ["failed-logon"]
        add_field => { "alert_type" => "failed_logon" }
      }
    }

    # Detect successful logon after failures: EventID 4624
    if [winlog][event_id] == 4624 {
      mutate { add_field => { "alert_type" => "successful_logon" } }
    }

    # Detect privilege escalation: EventID 4672
    if [winlog][event_id] == 4672 {
      mutate {
        add_tag => ["privilege-escalation"]
        add_field => { "alert_type" => "special_privileges_assigned" }
      }
    }

    # Sysmon Event ID 1: Process Create — flag suspicious PowerShell
    if [winlog][event_id] == 1 {
      if [winlog][event_data][CommandLine] =~ /(?i)(-enc|-encodedcommand|iex|invoke-expression|downloadstring|webclient)/ {
        mutate {
          add_tag => ["powershell-suspicious"]
          add_field => { "alert_type" => "suspicious_powershell" }
          add_field => { "severity" => "high" }
        }
      }
    }

    # Sysmon Event ID 3: Network connection from PowerShell
    if [winlog][event_id] == 3 {
      if [winlog][event_data][Image] =~ /(?i)(powershell|pwsh|cmd)/ {
        mutate {
          add_tag => ["powershell-network"]
          add_field => { "alert_type" => "powershell_network_connection" }
          add_field => { "severity" => "medium" }
        }
      }
    }
  }

  # ─── Linux Auth Logs (via Filebeat or Syslog) ────────────────────────────────
  if [type] == "syslog" or [log][file][path] =~ /auth\.log|secure/ {
    mutate { add_tag => ["linux-auth"] }

    # SSH brute force detection
    if [message] =~ /Failed password/ {
      mutate {
        add_tag => ["ssh-failed-auth"]
        add_field => { "alert_type" => "ssh_failed_password" }
      }
      grok {
        match => {
          "message" => "Failed password for %{USERNAME:ssh_user} from %{IP:src_ip} port %{NUMBER:src_port}"
        }
      }
    }

    # Successful SSH login
    if [message] =~ /Accepted password|Accepted publickey/ {
      mutate { add_field => { "alert_type" => "ssh_successful_login" } }
      grok {
        match => {
          "message" => "Accepted %{WORD:auth_method} for %{USERNAME:ssh_user} from %{IP:src_ip}"
        }
      }
    }

    # Sudo abuse
    if [message] =~ /sudo.*COMMAND/ {
      mutate {
        add_tag => ["sudo-usage"]
        add_field => { "alert_type" => "sudo_command_executed" }
      }
    }

    # Failed sudo
    if [message] =~ /sudo.*authentication failure/ {
      mutate {
        add_tag => ["sudo-failure"]
        add_field => { "alert_type" => "sudo_auth_failure" }
        add_field => { "severity" => "high" }
      }
    }
  }

  # ─── GeoIP enrichment ────────────────────────────────────────────────────────
  if [src_ip] {
    geoip {
      source => "src_ip"
      target => "geoip"
    }
  }

  # ─── Timestamp normalization ──────────────────────────────────────────────────
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  # All events → main SIEM index
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "siem-logs-%{+YYYY.MM.dd}"
  }

  # Alerts only → dedicated alert index
  if [alert_type] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "siem-alerts-%{+YYYY.MM.dd}"
    }
  }

  # Debug output (comment out in production)
  # stdout { codec => rubydebug }
}
