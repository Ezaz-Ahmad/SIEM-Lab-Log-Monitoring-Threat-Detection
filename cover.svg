<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2214 550" width="2214" height="550">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020A1A"/>
      <stop offset="0.5" stop-color="#062046"/>
      <stop offset="1" stop-color="#020A1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1e90ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1e90ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lockBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ad6ff"/>
      <stop offset="0.5" stop-color="#2c8ed1"/>
      <stop offset="1" stop-color="#0d3a66"/>
    </linearGradient>
    <linearGradient id="shackle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f8ff"/>
      <stop offset="1" stop-color="#5aa9d9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="hexGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- hexagon group used inline -->
    <g id="hexShape">
      <polygon points="70,0 35,60.62 -35,60.62 -70,0 -35,-60.62 35,-60.62"
               fill="#0a1f3d" fill-opacity="0.88" stroke="#3aa8ff" stroke-width="2.5"/>
      <polygon points="70,0 35,60.62 -35,60.62 -70,0 -35,-60.62 35,-60.62"
               fill="none" stroke="#7ad6ff" stroke-width="0.8" stroke-opacity="0.4"
               transform="scale(0.92)"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="2214" height="550" fill="url(#bg)"/>

  <!-- Subtle world-map dot pattern (right) -->
  <g opacity="0.18" fill="#5fb6ff">
    <g id="dots">
      <!-- generated grid of dots -->
    </g>
  </g>
  <!-- Decorative grid lines -->
  <g stroke="#1e90ff" stroke-opacity="0.10" stroke-width="1">
    <path d="M0 110 H2214 M0 220 H2214 M0 330 H2214 M0 440 H2214"/>
    <path d="M200 0 V550 M500 0 V550 M800 0 V550 M1100 0 V550 M1400 0 V550 M1700 0 V550 M2000 0 V550"/>
  </g>

  <!-- Faint binary/code on far right -->
  <g font-family="Consolas, monospace" font-size="13" fill="#3a9ae8" opacity="0.18">
    <text x="1820" y="40">10110010 01101001 11010100</text>
    <text x="1860" y="60">01001011 10110101 00110100</text>
    <text x="1880" y="80">11001010 01010110 10010111</text>
    <text x="1920" y="100">10101001 11010010 01010011</text>
    <text x="1880" y="120">00110101 10101101 11001100</text>
    <text x="1860" y="140">01011010 10110010 01101001</text>
    <text x="1900" y="160">11010100 01001011 10110101</text>
    <text x="1820" y="500">01001110 10101011 00011010</text>
    <text x="1850" y="520">11010010 01010100 10101101</text>
  </g>

  <!-- LEFT: padlock with tech ring -->
  <g transform="translate(360,275)">
    <!-- glow halo -->
    <circle r="240" fill="url(#glow)"/>
    <!-- outer dashed ring -->
    <circle r="215" fill="none" stroke="#1ea3ff" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="4 8"/>
    <circle r="200" fill="none" stroke="#1ea3ff" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="2 5"/>
    <!-- inner segmented ring -->
    <g stroke="#5cc2ff" stroke-width="3" fill="none">
      <path d="M -180 0 A 180 180 0 0 1 -130 -124" stroke-opacity="0.7"/>
      <path d="M 180 0 A 180 180 0 0 1 130 124" stroke-opacity="0.7"/>
      <path d="M -60 -170 A 180 180 0 0 1 60 -170" stroke-opacity="0.9"/>
      <path d="M 60 170 A 180 180 0 0 1 -60 170" stroke-opacity="0.9"/>
    </g>
    <!-- ring tick marks -->
    <g stroke="#9fdcff" stroke-width="2">
      <line x1="0" y1="-205" x2="0" y2="-190"/>
      <line x1="0" y1="205" x2="0" y2="190"/>
      <line x1="-205" y1="0" x2="-190" y2="0"/>
      <line x1="205" y1="0" x2="190" y2="0"/>
    </g>

    <!-- shackle -->
    <path d="M -55 -25 V -85 a 55 55 0 0 1 110 0 V -25"
          fill="none" stroke="url(#shackle)" stroke-width="22" stroke-linecap="round"/>
    <!-- lock body -->
    <rect x="-90" y="-30" width="180" height="160" rx="18" ry="18"
          fill="url(#lockBody)" stroke="#9fdcff" stroke-width="2"/>
    <!-- circuit pattern on lock -->
    <g stroke="#bfeaff" stroke-opacity="0.55" stroke-width="1.2" fill="none">
      <path d="M -75 -10 H -45 V 5 H -25"/>
      <path d="M 75 110 H 45 V 95 H 25"/>
      <path d="M -75 110 H -45 V 95 H -25"/>
      <path d="M 75 -10 H 45 V 5 H 25"/>
      <circle cx="-25" cy="5" r="2.5" fill="#bfeaff"/>
      <circle cx="25" cy="5" r="2.5" fill="#bfeaff"/>
      <circle cx="-25" cy="95" r="2.5" fill="#bfeaff"/>
      <circle cx="25" cy="95" r="2.5" fill="#bfeaff"/>
    </g>
    <!-- keyhole -->
    <g fill="#031128">
      <circle cx="0" cy="35" r="18"/>
      <path d="M -6 40 L -10 95 H 10 L 6 40 Z"/>
    </g>
  </g>

  <!-- Top-right checkmark shield -->
  <g transform="translate(2080,70)">
    <path d="M0 -50 L42 -34 V 6 C 42 36 22 56 0 64 C -22 56 -42 36 -42 6 V -34 Z"
          fill="#0a3b6e" stroke="#5fb6ff" stroke-width="2.5"/>
    <path d="M -18 5 L -4 19 L 20 -10" fill="none" stroke="#7ad6ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============ RIGHT: TOOL HEX GRID ============ -->
  <!-- Layout: 4 columns x 3 rows of hexes, centered around x=1450, y=275 -->
  <!-- hex width 140, horizontal spacing 165, row vertical 145 -->
  <g id="tools" font-family="Segoe UI, Arial, sans-serif" font-weight="700">

    <!-- ROW 1 -->
    <!-- Splunk -->
    <g transform="translate(820,150)">
      <use href="#hexShape"/>
      <!-- chevron -->
      <path d="M -28 -22 L 10 0 L -28 22 L -18 22 L 22 0 L -18 -22 Z" fill="#65A637"/>
      <path d="M 4 -22 L 42 0 L 4 22 L 14 22 L 54 0 L 14 -22 Z" fill="#F99D1C" transform="translate(-22,0)"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">splunk</text>
    </g>

    <!-- Wireshark -->
    <g transform="translate(985,150)">
      <use href="#hexShape"/>
      <!-- shark fin / wave -->
      <path d="M -40 18 Q -28 -28 -2 -14 Q 8 -8 18 -22 Q 30 -34 42 -10 Q 30 18 0 22 Q -22 26 -40 18 Z"
            fill="#1679C0"/>
      <path d="M -32 14 Q -20 -16 -4 -8" stroke="#a4d8ff" stroke-width="2" fill="none"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Wireshark</text>
    </g>

    <!-- Kali Linux -->
    <g transform="translate(1150,150)">
      <use href="#hexShape"/>
      <!-- stylized dragon swoosh -->
      <g fill="#367BF0">
        <path d="M -42 -8 C -30 -34 0 -34 18 -14 C 28 -2 36 6 44 14 C 30 8 22 14 14 22 C 4 32 -10 30 -22 22 C -36 12 -44 4 -42 -8 Z"/>
        <path d="M 10 -16 L 30 -28 L 24 -10 Z" fill="#1e60d8"/>
        <circle cx="-12" cy="-2" r="3" fill="#020A1A"/>
      </g>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Kali Linux</text>
    </g>

    <!-- Metasploit -->
    <g transform="translate(1315,150)">
      <use href="#hexShape"/>
      <!-- red M / target -->
      <g fill="none" stroke="#E81C2A" stroke-width="4">
        <circle cx="0" cy="0" r="22"/>
        <circle cx="0" cy="0" r="12"/>
      </g>
      <circle cx="0" cy="0" r="4" fill="#E81C2A"/>
      <path d="M -30 0 H -26 M 26 0 H 30 M 0 -30 V -26 M 0 26 V 30" stroke="#E81C2A" stroke-width="3"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Metasploit</text>
    </g>

    <!-- Burp Suite -->
    <g transform="translate(1480,150)">
      <use href="#hexShape"/>
      <!-- orange flame / drop -->
      <path d="M 0 -28 C 16 -10 22 4 18 14 C 14 24 6 28 0 28 C -6 28 -14 24 -18 14 C -22 4 -16 -10 0 -28 Z"
            fill="#FF6633"/>
      <path d="M -4 6 C -8 -2 -4 -10 2 -16 C 0 -6 4 0 6 8 C 4 14 -2 14 -4 6 Z" fill="#ffd2bf"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Burp Suite</text>
    </g>

    <!-- Nmap -->
    <g transform="translate(1645,150)">
      <use href="#hexShape"/>
      <!-- radar / scope -->
      <g fill="none" stroke="#9b59ff" stroke-width="2.5">
        <circle cx="0" cy="0" r="26"/>
        <circle cx="0" cy="0" r="18"/>
        <circle cx="0" cy="0" r="10"/>
      </g>
      <path d="M 0 0 L 24 -12" stroke="#cba6ff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="3" fill="#cba6ff"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Nmap</text>
    </g>

    <!-- ROW 2 -->
    <!-- GitHub -->
    <g transform="translate(820,300)">
      <use href="#hexShape"/>
      <!-- octocat silhouette -->
      <path d="M 0 -30 C -18 -30 -32 -16 -32 2 C -32 17 -22 30 -8 34 C -7 32 -7 30 -7 28 C -14 30 -16 25 -16 25 C -18 22 -20 21 -20 21 C -23 19 -19 19 -19 19 C -16 19 -14 22 -14 22 C -11 26 -7 25 -5 24 C -5 22 -4 20 -3 19 C -10 18 -16 16 -16 6 C -16 3 -15 0 -13 -2 C -14 -3 -14 -7 -13 -10 C -13 -10 -10 -11 -5 -7 C -2 -8 1 -8 4 -8 C 7 -8 10 -8 13 -7 C 18 -11 21 -10 21 -10 C 22 -7 22 -3 21 -2 C 23 0 24 3 24 6 C 24 16 18 18 11 19 C 12 20 13 22 13 25 C 13 28 13 30 13 32 C 26 28 36 16 36 2 C 36 -16 22 -30 0 -30 Z"
            fill="#ffffff"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">GitHub</text>
    </g>

    <!-- VS Code -->
    <g transform="translate(985,300)">
      <use href="#hexShape"/>
      <path d="M 18 -28 L 32 -22 V 22 L 18 28 L -18 -2 L -28 8 L -32 6 V -6 L -28 -8 L -18 2 Z"
            fill="#0078D4"/>
      <path d="M 18 -16 L -2 0 L 18 16 Z" fill="#1c8fe0"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">VS Code</text>
    </g>

    <!-- Docker -->
    <g transform="translate(1150,300)">
      <use href="#hexShape"/>
      <!-- whale + containers -->
      <g fill="#1D63ED">
        <rect x="-26" y="-14" width="10" height="10" rx="1"/>
        <rect x="-14" y="-14" width="10" height="10" rx="1"/>
        <rect x="-2" y="-14" width="10" height="10" rx="1"/>
        <rect x="-14" y="-26" width="10" height="10" rx="1"/>
        <rect x="-2" y="-26" width="10" height="10" rx="1"/>
        <rect x="10" y="-14" width="10" height="10" rx="1"/>
        <path d="M -34 -2 H 26 C 32 -2 38 4 38 10 C 30 16 18 18 6 16 C -8 14 -22 14 -34 8 Z"/>
        <path d="M 30 -6 Q 38 -10 36 -2" stroke="#1D63ED" stroke-width="2" fill="none"/>
      </g>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Docker</text>
    </g>

    <!-- OWASP -->
    <g transform="translate(1315,300)">
      <use href="#hexShape"/>
      <!-- shield + lock -->
      <path d="M 0 -28 L 24 -20 V 4 C 24 20 12 28 0 32 C -12 28 -24 20 -24 4 V -20 Z"
            fill="#000000" stroke="#ffffff" stroke-width="1.5"/>
      <path d="M -8 -2 V -8 a 8 8 0 0 1 16 0 V -2" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <rect x="-10" y="-2" width="20" height="16" rx="2" fill="#ffffff"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">OWASP</text>
    </g>

    <!-- Linux Tux -->
    <g transform="translate(1480,300)">
      <use href="#hexShape"/>
      <!-- penguin -->
      <g>
        <ellipse cx="0" cy="-8" rx="16" ry="18" fill="#1a1a1a"/>
        <ellipse cx="0" cy="14" rx="20" ry="18" fill="#1a1a1a"/>
        <ellipse cx="0" cy="16" rx="13" ry="13" fill="#ffffff"/>
        <circle cx="-5" cy="-12" r="3" fill="#ffffff"/>
        <circle cx="5" cy="-12" r="3" fill="#ffffff"/>
        <circle cx="-5" cy="-11" r="1.5" fill="#0a0a0a"/>
        <circle cx="5" cy="-11" r="1.5" fill="#0a0a0a"/>
        <path d="M -4 -4 L 0 -1 L 4 -4 L 2 1 L -2 1 Z" fill="#F5A623"/>
        <path d="M -10 32 L -2 28 L -2 34 Z" fill="#F5A623"/>
        <path d="M 10 32 L 2 28 L 2 34 Z" fill="#F5A623"/>
      </g>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Linux</text>
    </g>

    <!-- Windows -->
    <g transform="translate(1645,300)">
      <use href="#hexShape"/>
      <g fill="#00A4EF">
        <rect x="-24" y="-22" width="20" height="20"/>
        <rect x="0" y="-22" width="20" height="20"/>
        <rect x="-24" y="2" width="20" height="20"/>
        <rect x="0" y="2" width="20" height="20"/>
      </g>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Windows</text>
    </g>

    <!-- ROW 3 -->
    <!-- ELK / Elastic -->
    <g transform="translate(902,450)">
      <use href="#hexShape"/>
      <g>
        <path d="M -22 -18 H 22 V -2 H -22 Z" fill="#FED10A"/>
        <path d="M -26 2 H 14 V 18 H -26 Z" fill="#1BA9F5"/>
        <path d="M 18 2 H 26 V 26 H 18 Z" fill="#00BFB3"/>
      </g>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Elastic / ELK</text>
    </g>

    <!-- IBM QRadar / SIEM -->
    <g transform="translate(1067,450)">
      <use href="#hexShape"/>
      <!-- waveform shield -->
      <path d="M 0 -26 L 22 -18 V 4 C 22 18 10 26 0 30 C -10 26 -22 18 -22 4 V -18 Z"
            fill="#0F62FE" stroke="#a4d8ff" stroke-width="1.5"/>
      <path d="M -14 4 L -8 -4 L -2 8 L 4 -8 L 10 6 L 14 0" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">SIEM</text>
    </g>

    <!-- Python -->
    <g transform="translate(1232,450)">
      <use href="#hexShape"/>
      <g>
        <path d="M -4 -28 C -16 -28 -22 -22 -22 -12 V -2 H 0 V 2 H -26 C -34 2 -36 10 -36 18 C -36 28 -32 32 -22 32 H -12 V 22 C -12 14 -8 10 0 10 H 14 C 22 10 26 6 26 -2 V -12 C 26 -22 22 -28 14 -28 Z M -10 -22 a 3 3 0 1 1 0 6 a 3 3 0 0 1 0 -6 Z"
              fill="#3776AB"/>
        <path d="M 4 32 C 16 32 22 26 22 16 V 6 H 0 V 2 H 26 C 34 2 36 -6 36 -14 C 36 -24 32 -28 22 -28 H 12 V -18 C 12 -10 8 -6 0 -6 H -14 C -22 -6 -26 -2 -26 6 V 16 C -26 26 -22 32 -14 32 Z M 10 26 a 3 3 0 1 1 0 -6 a 3 3 0 0 1 0 6 Z"
              fill="#FFD43B"/>
      </g>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Python</text>
    </g>

    <!-- Active Directory -->
    <g transform="translate(1397,450)">
      <use href="#hexShape"/>
      <!-- network nodes -->
      <g fill="none" stroke="#5fb6ff" stroke-width="2">
        <line x1="0" y1="-22" x2="-20" y2="10"/>
        <line x1="0" y1="-22" x2="20" y2="10"/>
        <line x1="-20" y1="10" x2="20" y2="10"/>
        <line x1="0" y1="-22" x2="0" y2="22"/>
        <line x1="-20" y1="10" x2="0" y2="22"/>
        <line x1="20" y1="10" x2="0" y2="22"/>
      </g>
      <g fill="#5fb6ff">
        <circle cx="0" cy="-22" r="6"/>
        <circle cx="-20" cy="10" r="6"/>
        <circle cx="20" cy="10" r="6"/>
        <circle cx="0" cy="22" r="6"/>
      </g>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Active Directory</text>
    </g>

    <!-- Cloud / Azure -->
    <g transform="translate(1562,450)">
      <use href="#hexShape"/>
      <path d="M -22 10 C -32 10 -34 -2 -26 -8 C -26 -22 -8 -26 -2 -14 C 8 -22 24 -16 22 -2 C 32 -2 32 12 22 12 Z"
            fill="#0089D6"/>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Azure</text>
    </g>

    <!-- Bash / Terminal -->
    <g transform="translate(1727,450)">
      <use href="#hexShape"/>
      <rect x="-30" y="-22" width="60" height="44" rx="4" fill="#1a1a1a" stroke="#5fb6ff" stroke-width="1.5"/>
      <text x="-22" y="4" font-family="Consolas, monospace" font-size="16" fill="#4caf50">&gt;_</text>
      <text text-anchor="middle" y="48" font-size="16" fill="#9fdcff">Bash / CLI</text>
    </g>

  </g>
</svg>
