# Splunk inputs.conf — place at $SPLUNK_HOME/etc/system/local/inputs.conf
# Restart Splunk after editing

# ─── Windows Event Logs ──────────────────────────────────────────────────────

[WinEventLog://Security]
disabled = false
index = siem_windows
sourcetype = WinEventLog:Security
# Key event IDs for security monitoring
whitelist = 4624,4625,4648,4657,4672,4688,4698,4699,4700,4701,4720,4722,4724,4728,4732,4756

[WinEventLog://System]
disabled = false
index = siem_windows
sourcetype = WinEventLog:System
whitelist = 7045,7036,104

[WinEventLog://Application]
disabled = false
index = siem_windows
sourcetype = WinEventLog:Application

# ─── Sysmon ──────────────────────────────────────────────────────────────────

[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = false
index = siem_sysmon
sourcetype = XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
renderXml = true

# ─── PowerShell Logging ───────────────────────────────────────────────────────

[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = false
index = siem_powershell
sourcetype = WinEventLog:Microsoft-Windows-PowerShell/Operational

[WinEventLog://Windows PowerShell]
disabled = false
index = siem_powershell
sourcetype = WinEventLog:Windows PowerShell

# ─── Linux Auth Logs (via Universal Forwarder on Linux VM) ───────────────────

[monitor:///var/log/auth.log]
disabled = false
index = siem_linux
sourcetype = linux_secure
host_regex = (.+)

[monitor:///var/log/secure]
disabled = false
index = siem_linux
sourcetype = linux_secure

[monitor:///var/log/syslog]
disabled = false
index = siem_linux
sourcetype = syslog
